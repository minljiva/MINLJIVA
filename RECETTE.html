  let activeType = 'all';
  let activeTime = 'all';

  function filterType(type, btn) {
    activeType = type;
    document.querySelectorAll('.filter-btn:not(.time-btn)').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function filterTime(time, btn) {
    activeTime = time;
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    let filtered = recipes;
    if (activeType !== 'all') filtered = filtered.filter(r => r.type === activeType);
    if (activeTime !== 'all') filtered = filtered.filter(r => r.time && r.time.includes(activeTime));

    document.getElementById('count').textContent =
      filtered.length + ' recette' + (filtered.length > 1 ? 's' : '') +
      ' affichée' + (filtered.length > 1 ? 's' : '');

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">Aucune recette ne correspond à cette combinaison de filtres.</div>';
      return;
    }

    grid.innerHTML = filtered.map(r => `
      <div class="recipe">
        <div class="recipe-header">
          <div class="recipe-icon recipe-icon-${r.iconColor}">${r.icon}</div>
          <div><p class="recipe-title">${r.title}</p><p class="recipe-sub">${r.sub}</p></div>
        </div>
        ${r.blocks ? `<div class="row">${r.blocks.map(b => `
          <div class="block">
            <div class="block-label">${b.label}</div>
            <div class="block-val">${b.val}</div>
          </div>
        `).join('')}</div>` : ''}
        ${r.steps ? `<div class="how-box how-box-steps">
          ${r.steps.map((s, i) => `
            <div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${s}</div></div>
          `).join('')}
        </div>` : ''}
        ${r.note ? `<div class="note">${r.note}</div>` : ''}
        ${r.potInfo ? `<div class="pot-info">${r.potInfo}</div>` : ''}
      </div>
    `).join('');
  }

  render();
  </script>


<script>
  const NAV = [
    { cat: "balcon",   pages: [
      { label: "Herboriste", href: "HERBORISTE.html" },
      { label: "Tisanes",    href: "TISANES.html" },
      { label: "Recettes",   href: "RECETTE.html" },
      { label: "L'avenir",  href: "AVENIR.html" }
    ]},
    { cat: "projets",  pages: [
      { label: "Crochet",  href: "CROCHET.html" },
      { label: "Drainage", href: "DRAINAGE.html" }
    ]},
    { cat: "learning", pages: [
      { label: "Coding", href: "CODING.html" }
    ]},
    { cat: "iceolie",  pages: [], soon: true }
  ];
  (function buildNav() {
    const nav = document.getElementById('main-nav');
    if (!nav) return;
    const cat = nav.closest('[data-page]') ? nav.closest('[data-page]').dataset.page : '';
    NAV.forEach(group => {
      const wrap = document.createElement('div');
      wrap.className = 'nav-group' + (group.cat === cat ? ' nav-group-active' : '');
      const lbl = document.createElement('span');
      lbl.className = 'nav-cat' + (group.cat === cat ? ' actif' : '') + (group.soon ? ' nav-cat-soon' : '');
      lbl.textContent = group.cat;
      wrap.appendChild(lbl);
      if (group.pages.length > 0) {
        const dd = document.createElement('div');
        dd.className = 'nav-dropdown';
        group.pages.forEach(p => {
          const a = document.createElement('a');
          a.href = p.href; a.textContent = p.label; a.className = 'nav-drop-item';
          dd.appendChild(a);
        });
        wrap.appendChild(dd);
      }
      nav.appendChild(wrap);
    });
  })();
</script>
