  let activeCat   = 'all';
  let activeEffet = 'all';

  function filterCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.filter-btn:not([onclick*="filterEffet"])').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function filterEffet(effet, btn) {
    activeEffet = effet;
    document.querySelectorAll('[onclick*="filterEffet"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    let filtered = tisanes;
    if (activeCat   !== 'all') filtered = filtered.filter(t => t.cat === activeCat);
    if (activeEffet !== 'all') filtered = filtered.filter(t => t.effet.includes(activeEffet));

    document.getElementById('count').textContent =
      filtered.length + ' fiche' + (filtered.length > 1 ? 's' : '') +
      ' affichée' + (filtered.length > 1 ? 's' : '');

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">Aucune tisane ne correspond à cette sélection.</div>';
      return;
    }

    grid.innerHTML = filtered.map(t => `
      <div class="card">
        <div class="card-header">
          <span class="badge ${t.badgeClass}">${t.badge}</span>
        </div>
        <div class="plant-name">${t.title}</div>
        <div class="plant-latin">${t.sub}</div>
        ${t.dosage ? `
        <div class="row row-tisane">
          <div class="block">
            <div class="block-label">${t.cat === 'melange' ? 'Recette' : 'Dosage frais'}</div>
            <div class="block-val">${t.dosage}</div>
          </div>
          <div class="block">
            <div class="block-label">Infusion</div>
            <div class="block-val">${t.infusion}</div>
          </div>
        </div>` : ''}
        ${t.desc ? `<div class="desc desc-tisane">${t.desc}</div>` : ''}
        ${t.note ? `<div class="note">${t.note}</div>` : ''}
        ${t.warn ? `<div class="warn">${t.warn}</div>` : ''}
      </div>
    `).join('');
  }

  render();

<script>
  const NAV = [
    { cat: "balcon",   pages: [
      { label: "Herboriste", href: "HERBORISTE.html" },
      { label: "Tisanes",    href: "TISANES.html" },
      { label: "Recettes",   href: "RECETTE.html" },
      { label: "CONVOITISES",  href: "CONVOITISES.html" }
    ]},
    { cat: "projets",  pages: [
      { label: "Crochet",  href: "CROCHET.html" },
      { label: "Drainage", href: "DRAINAGE.html" }
    ]},
    { cat: "learning", pages: [
      { label: "Coding", href: "CODING.html" }
    ]},
    { cat: "iceolie",  pages: [], soon: true }
  ];
  (function buildNav() {
    const nav = document.getElementById('main-nav');
    if (!nav) return;
    const cat = nav.closest('[data-page]') ? nav.closest('[data-page]').dataset.page : '';
    NAV.forEach(group => {
      const wrap = document.createElement('div');
      wrap.className = 'nav-group' + (group.cat === cat ? ' nav-group-active' : '');
      const lbl = document.createElement('span');
      lbl.className = 'nav-cat' + (group.cat === cat ? ' actif' : '') + (group.soon ? ' nav-cat-soon' : '');
      lbl.textContent = group.cat;
      wrap.appendChild(lbl);
      if (group.pages.length > 0) {
        const dd = document.createElement('div');
        dd.className = 'nav-dropdown';
        group.pages.forEach(p => {
          const a = document.createElement('a');
          a.href = p.href; a.textContent = p.label; a.className = 'nav-drop-item';
          dd.appendChild(a);
        });
        wrap.appendChild(dd);
      }
      nav.appendChild(wrap);
    });
  })();
</script>
