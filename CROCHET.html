<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Crochet — Minljiva</title>
</head>
<body>

  <header class="site-header">
    <img src="Minljiva.png" alt="Minljiva">
    <nav class="nav">
      <a href="index.html">INDEX</a> /
      <a href="HERBORISTE.html">HERBORISTE</a> /
      <a href="TISANES.html">TISANES</a> /
      <a href="RECETTE.html">RECETTES</a> /
      <a href="AVENIR.html">L'AVENIR</a> /
      <a href="CODING.html">CODING</a> /    
      <a href="DRAINAGE.html">DRAINAGE</a> /
      <a href="CROCHET.html" class="actif">CROCHET</a>
    </nav>
  </header>

  <h1>Crochet</h1>
  <p class="subtitle">Tous mes projets</p>

  <button class="btn-add" onclick="ouvrirModal()">+ Nouveau projet</button>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFiltre('all', this)">Tout</button>
    <button class="filter-btn" onclick="setFiltre('todo', this)">TO DO</button>
    <button class="filter-btn" onclick="setFiltre('wip', this)">WIP</button>
    <button class="filter-btn" onclick="setFiltre('done', this)">DONE</button>
  </div>

  <div class="count-bar" id="count"></div>
  <div class="crochet-grid" id="grid">
    <div class="loading">Chargement des projets…</div>
  </div>

  <div class="overlay" id="overlay" onclick="fermerModalSiDehors(event)">
    <div class="modal">
      <h2>Nouveau projet</h2>
      <div class="field">
        <label>Nom du projet *</label>
        <input type="text" id="inp-titre" placeholder="ex : Bonnet rayé bleu" />
      </div>
      <div class="field">
        <label>Pattern (nom ou lien)</label>
        <input type="text" id="inp-pattern" placeholder="ex : Ravelry — Cozy Hat" />
      </div>
      <div class="field">
        <label>Notes / Explications</label>
        <textarea id="inp-explication" placeholder="Laine, aiguilles..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-next" onclick="fermerModal()">Annuler</button>
        <button class="btn-save" id="btn-save" onclick="ajouterProjet()">Ajouter</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay-duree" onclick="fermerDureeSiDehors(event)">
    <div class="modal">
      <h2>✓ Projet terminé !</h2>
      <div class="field">
        <label>Temps passé (optionnel)</label>
        <input type="text" id="inp-duree" placeholder="ex : 12h, 3 séances…" />
      </div>
      <div class="modal-actions">
        <button class="btn-next" onclick="validerDuree(false)">Passer</button>
        <button class="btn-save" onclick="validerDuree(true)">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay" onclick="fermerDetail()"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div style="flex:1">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
          <div id="d-statut-badge"></div>
          <div id="d-date" style="font-size: 12px; color: var(--texte-pale); font-weight: 500; letter-spacing: 0.05em;"></div>
        </div>
        <div style="font-size: 18px; font-weight: 500;" id="d-titre-affiche"></div>
      </div>
      <button onclick="fermerDetail()" style="background:none; border:none; cursor:pointer; font-size:20px; align-self: flex-start;">✕</button>
    </div>

    <div class="detail-section">
      <div class="detail-label">Statut du projet</div>
      <select class="edit-input" id="d-statut">
        <option value="todo">TO DO</option>
        <option value="wip">WIP</option>
        <option value="done">DONE</option>
      </select>
    </div>

    <div class="detail-section">
      <div class="detail-label">Nom du projet</div>
      <input class="edit-input" type="text" id="d-titre" />
    </div>

    <div class="detail-section">
      <div class="detail-label">Pattern</div>
      <input class="edit-input" type="text" id="d-pattern" />
    </div>

    <div class="detail-section">
      <div class="detail-label">Notes & explications</div>
      <textarea class="edit-textarea" id="d-explication-detail"></textarea>
    </div>

    <div class="detail-section">
      <div class="detail-label">Temps total passé</div>
      <input class="edit-input" type="text" id="d-duree" />
    </div>

    <button class="btn-edit-save" id="btn-detail-save" onclick="sauvegarderDetail()">Enregistrer les modifications</button>
    <div class="save-ok" id="save-ok">✓ Modifications enregistrées</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wenkojnlclbyuzgmtyyw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Gs78kcFk41qbUpaIM3RhZw_ONgTzhuQ';
    const TABLE = 'projets_crochet';

    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': 'return=representation'
    };

    let projets = [];
    let filtre = 'all';
    let projetEnCours = null;
    let detailId = null;

    async function charger() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?order=created_at.desc`, { headers });
        projets = await res.json();
        render();
      } catch(e) { console.error(e); }
    }

    function render() {
      const grid = document.getElementById('grid');
      const list = filtre === 'all' ? projets : projets.filter(p => p.statut === filtre);

      const countElem = document.getElementById('count');
      if (countElem) {
        countElem.textContent = `${list.length} projet${list.length > 1 ? 's' : ''}`;
      }

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">Aucun projet ici. 🧶</div>';
        return;
      }

      const statutLabel = { todo: 'TO DO', wip: 'WIP', done: 'DONE' };

      grid.innerHTML = list.map(p => {
        const btnSuivant = p.statut === 'todo'
          ? `<button class="btn-next" onclick="event.stopPropagation(); changerStatut('${p.id}','wip')">▶ Démarrer</button>`
          : p.statut === 'wip'
          ? `<button class="btn-next" onclick="event.stopPropagation(); demanderDuree('${p.id}')">✓ Terminer</button>`
          : '';

        return `
          <div class="crochet-card ${p.statut}">
            <div class="card-top" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
              🧶<div class="plant-name clickable-title" onclick="ouvrirDetail('${p.id}')" style="cursor:pointer; flex:1; margin-right:10px;">
                 ${p.titre}
              </div>
              <span class="badge statut-${p.statut}">${statutLabel[p.statut]}</span>
            </div>
            ${p.pattern ? `<div class="tip">📋 ${p.pattern}</div>` : ''}
            ${p.duree ? `<div class="pot-info">⏱ ${p.duree}</div>` : ''}
            <div class="card-actions" style="margin-top:12px; display: flex; gap: 8px;">
              ${btnSuivant}
              <button class="btn-delete" onclick="event.stopPropagation(); supprimerProjet('${p.id}')">✕</button>
            </div>
          </div>`;
      }).join('');
    }

    function setFiltre(f, btn) {
      filtre = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function ouvrirModal() {
      document.getElementById('inp-titre').value = '';
      document.getElementById('inp-pattern').value = '';
      document.getElementById('inp-explication').value = '';
      document.getElementById('overlay').classList.add('open');
    }
    function fermerModal() { document.getElementById('overlay').classList.remove('open'); }
    function fermerModalSiDehors(e) { if (e.target.id === 'overlay') fermerModal(); }

    async function ajouterProjet() {
      const titre = document.getElementById('inp-titre').value.trim();
      const pattern = document.getElementById('inp-pattern').value.trim();
      const explication = document.getElementById('inp-explication').value.trim();
      if (!titre) return;

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ titre, pattern: pattern||null, explication: explication||null, statut: 'todo' })
        });
        fermerModal();
        await charger();
      } catch(e) { alert(e.message); }
    }

    function demanderDuree(id) {
      projetEnCours = id;
      document.getElementById('inp-duree').value = '';
      document.getElementById('overlay-duree').classList.add('open');
    }
    function fermerDureeSiDehors(e) { if (e.target.id === 'overlay-duree') validerDuree(false); }

    async function validerDuree(sauver) {
      const duree = sauver ? document.getElementById('inp-duree').value.trim() : null;
      document.getElementById('overlay-duree').classList.remove('open');
      await changerStatut(projetEnCours, 'done', duree);
    }

    async function changerStatut(id, statut, duree = null) {
      const body = { statut };
      if (duree) body.duree = duree;
      await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
        method: 'PATCH', headers, body: JSON.stringify(body)
      });
      await charger();
    }

    async function supprimerProjet(id) {
      if (!confirm('Supprimer ?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, { method: 'DELETE', headers });
      await charger();
    }

    function formaterDate(isoString) {
      if (!isoString) return "--";
      const date = new Date(isoString);
      return `${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear()}`;
    }
    
    function ouvrirDetail(id) {
      const p = projets.find(x => x.id === id);
      if (!p) return;
      detailId = id;
      
      document.getElementById('d-date').textContent = formaterDate(p.created_at);
      const statutLabel = { todo:'TO DO', wip:'WIP', done:'DONE' };
      
      // On utilise la classe .badge et la classe couleur .statut-XXX
      document.getElementById('d-statut-badge').innerHTML = `<span class="badge statut-${p.statut}">${statutLabel[p.statut]}</span>`;
      
      document.getElementById('d-titre-affiche').textContent = '🧶 ' + p.titre;
      document.getElementById('d-titre').value = p.titre || '';
      document.getElementById('d-pattern').value = p.pattern || '';
      document.getElementById('d-explication-detail').value = p.explication || '';
      document.getElementById('d-duree').value = p.duree || '';
      document.getElementById('d-statut').value = p.statut;
      
      document.getElementById('detail-overlay').classList.add('open');
      document.getElementById('detail-panel').classList.add('open');
    }

    function fermerDetail() {
      document.getElementById('detail-overlay').classList.remove('open');
      document.getElementById('detail-panel').classList.remove('open');
    }

    async function sauvegarderDetail() {
      const btn = document.getElementById('btn-detail-save');
      btn.disabled = true;
      
      const body = {
        titre: document.getElementById('d-titre').value,
        pattern: document.getElementById('d-pattern').value || null,
        explication: document.getElementById('d-explication-detail').value || null,
        duree: document.getElementById('d-duree').value || null,
        statut: document.getElementById('d-statut').value
      };

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${detailId}`, {
          method: 'PATCH', headers, body: JSON.stringify(body)
        });
        await charger();
        ouvrirDetail(detailId);
        document.getElementById('save-ok').style.display = 'block';
        setTimeout(() => document.getElementById('save-ok').style.display = 'none', 2000);
      } catch(e) { alert(e.message); }
      finally { btn.disabled = false; }
    }

    charger();
  </script>
</body>
</html>
